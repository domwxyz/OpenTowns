plugins {
    id 'java'
    id 'application'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

// Original source layout is kept as-is:
// src/ holds the xaos/ package tree next to the runtime data and libs.
sourceSets {
    main {
        java {
            srcDirs = ['src']
            exclude 'data/**'
            exclude 'lib/**'
        }
        resources {
            srcDirs = []
        }
    }
    // Tests live in a top-level test/ directory; they cannot go under src/
    // or the main sourceSet (srcDirs = ['src']) would compile them too.
    test {
        java {
            srcDirs = ['test']
        }
        resources {
            srcDirs = []
        }
    }
}

repositories {
    mavenCentral()
}

// LWJGL 3 ships its native binaries as per-platform classifier jars. Pick the
// classifier for the build host so a checkout links the right natives on
// Windows, Linux and macOS (incl. Apple Silicon). The headless sim is designed
// not to touch GL/AL, but selecting host natives keeps `run`/`runHeadless`
// working everywhere and removes "missing natives" as a cross-platform variable.
def osName = System.getProperty('os.name').toLowerCase()
def osArch = System.getProperty('os.arch').toLowerCase()
def lwjglNatives
if (osName.contains('win')) {
    lwjglNatives = osArch.contains('aarch64') ? 'natives-windows-arm64' : 'natives-windows'
} else if (osName.contains('mac') || osName.contains('darwin')) {
    lwjglNatives = osArch.contains('aarch64') ? 'natives-macos-arm64' : 'natives-macos'
} else {
    lwjglNatives = (osArch.contains('aarch64') || osArch.contains('arm')) ? 'natives-linux-arm64' : 'natives-linux'
}

dependencies {
    // The same libraries the Steam install vendored, sourced from Maven
    // Central so a bare checkout compiles (src/lib is gitignored). JNA is
    // the Steam API binding (optional at runtime, failure ignored); the
    // TWL PNGDecoder feeds textures to GL. src/lib/xaos.jar is the original
    // compiled game: reference only, must never be on the classpath or it
    // can shadow the freshly built classes.
    // Note: the vendored platform.jar (JNA platform utilities) turned out
    // to be unused; no source imports com.sun.jna.platform. Dropped.
    implementation 'net.java.dev.jna:jna:3.3.0'
    implementation 'org.l33tlabs.twl:pngdecoder:1.0'

    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.4'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // LWJGL 3. Windowing/input goes through the xaos.compat shims (GLFW),
    // rendering uses the same GL11/GL13 bindings the game always called,
    // audio (UtilsAL) uses OpenAL + STB Vorbis.
    implementation platform('org.lwjgl:lwjgl-bom:3.3.6')
    implementation 'org.lwjgl:lwjgl'
    implementation 'org.lwjgl:lwjgl-glfw'
    implementation 'org.lwjgl:lwjgl-opengl'
    implementation 'org.lwjgl:lwjgl-openal'
    implementation 'org.lwjgl:lwjgl-stb'
    // Native OS dialogs (message box, folder picker) for the first-run
    // asset setup; safe to call before GLFW init.
    implementation 'org.lwjgl:lwjgl-tinyfd'
    runtimeOnly "org.lwjgl:lwjgl::$lwjglNatives"
    runtimeOnly "org.lwjgl:lwjgl-glfw::$lwjglNatives"
    runtimeOnly "org.lwjgl:lwjgl-opengl::$lwjglNatives"
    runtimeOnly "org.lwjgl:lwjgl-openal::$lwjglNatives"
    runtimeOnly "org.lwjgl:lwjgl-stb::$lwjglNatives"
    runtimeOnly "org.lwjgl:lwjgl-tinyfd::$lwjglNatives"
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

application {
    mainClass = 'xaos.Towns'
}

// The packaged app jar names its dependencies via a manifest Class-Path so the
// jpackage launcher (which classpaths only the main jar) resolves them from the
// lib/ subfolder they are staged into. Resolved in doFirst so the runtime
// configuration is not read at configuration time. Harmless to gradlew run,
// which builds its own classpath and ignores the manifest.
def runtimeJars = configurations.runtimeClasspath
tasks.named('jar') {
    manifest {
        attributes 'Main-Class': 'xaos.Towns'
    }
    doFirst {
        manifest.attributes 'Class-Path': runtimeJars.files.collect { "lib/${it.name}" }.join(' ')
    }
}

// Headless deterministic test mode: worldgen + simulation, no window and
// no proprietary assets. Same JVM setup as run, different entry point.
//   .\gradlew runHeadless -Pseed=42 -Pticks=3000
tasks.register('runHeadless', JavaExec) {
    // Custom JavaExec tasks don't pick up the toolchain by themselves
    javaLauncher = javaToolchains.launcherFor(java.toolchain)
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'xaos.TownsHeadless'
    workingDir = file('src')
    jvmArgs '-Djava.library.path=lib/native'
    jvmArgs '--enable-native-access=ALL-UNNAMED'
    jvmArgs '--sun-misc-unsafe-memory-access=allow'
    if (project.hasProperty('seed')) {
        args "--seed=${project.property('seed')}"
    }
    if (project.hasProperty('ticks')) {
        args "--ticks=${project.property('ticks')}"
    }
    if (project.hasProperty('map')) {
        args "--map=${project.property('map')}"
    }
    if (project.hasProperty('userFolder')) {
        args "--user-folder=${project.property('userFolder')}"
    }
}

test {
    useJUnitPlatform()
    // Same working-directory contract as run/runHeadless: towns.ini,
    // graphics.ini and data/ resolve relative to the CWD.
    workingDir = file('src')
    // One JVM per test class = one game per JVM. The static god-objects
    // (Game, World, the managers) do not reset cleanly for a second new
    // game in the same JVM (World.maxEntityID keeps counting), so every
    // test class that boots a game must get a fresh JVM.
    forkEvery = 1
    jvmArgs '--enable-native-access=ALL-UNNAMED'
    jvmArgs '--sun-misc-unsafe-memory-access=allow'
    testLogging {
        events 'passed', 'skipped', 'failed'
        exceptionFormat 'full'
    }
}

tasks.named('run') {
    // The game resolves towns.ini, graphics.ini, audio.ini and data/
    // relative to the working directory. lib/native is only needed for
    // steam_api.dll now; LWJGL 3 natives come from the Maven classifier jars.
    workingDir = file('src')
    jvmArgs '-Djava.library.path=lib/native'
    // JDK 25: JNA and LWJGL 2 load native code from the unnamed module;
    // restricted native access will be blocked by default in a future JDK.
    jvmArgs '--enable-native-access=ALL-UNNAMED'
    // JDK 25: LWJGL 3's MemoryUtil still uses sun.misc.Unsafe memory
    // access, deprecated for removal (JEP 498). Opt in explicitly until
    // LWJGL moves to the FFM API.
    jvmArgs '--sun-misc-unsafe-memory-access=allow'
    // macOS: GLFW (and any AppKit windowing) must run on the process's
    // first thread, so the JVM has to be told to keep the main thread free
    // for it. Without this the windowed game (xaos.Towns) never opens a
    // window on a Mac. Windowed only: xaos.TownsHeadless must not require
    // it, so runHeadless deliberately omits this. The jpackage launcher
    // will need the same arg baked in for the macOS build.
    if (osName.contains('mac') || osName.contains('darwin')) {
        jvmArgs '-XstartOnFirstThread'
    }
}

// ---------------------------------------------------------------------------
// Player-ready release: a portable, self-contained app image built by jpackage.
//
// The output is a bundled-JRE app image (the player needs no system Java),
// zipped per OS. Run `./gradlew jpackageZip` ON EACH TARGET OS: jpackage cannot
// cross-build, and building on the host also picks up that host's LWJGL natives
// (selected into runtimeClasspath above) and its native launcher.
//
// Type is app-image (not msi/dmg/deb), so no WiX/extra tooling is needed on any
// OS, and the unzip-and-run result needs no installer and no admin rights.
//
// The packaged game roots its bundled content (the three .ini files and data/)
// at $APPDIR via -Dtowns.home, because a jpackage launcher's working directory
// is not the app dir (it is "/" on macOS: JDK-8306974). Everything the game
// resolves relative to the CWD in dev therefore resolves under $APPDIR here.
def appName = 'OpenTowns'
// jpackage requires a plain numeric MAJOR.MINOR.PATCH; macOS additionally
// requires MAJOR >= 1. Override per release with -PappVersion=1.2.3. RC status
// is carried by the git tag / GitHub prerelease, not by this number.
def appVersion = (project.findProperty('appVersion') ?: '1.0.0').toString()
def isMac = osName.contains('mac') || osName.contains('darwin')

// Stage everything the packaged game needs into a single --input directory:
// the app jar, every runtime dependency jar (LWJGL core + host natives, JNA,
// PNGDecoder), and the redistributable runtime content (the three .ini files
// and the data/ tree). The proprietary asset folders stay out: they are
// gitignored and the player's first-run setup copies them in.
tasks.register('stageJpackageInput', Sync) {
    dependsOn tasks.named('jar')
    into layout.buildDirectory.dir('jpackage-input')
    from tasks.named('jar')
    // Dependency jars go in a lib/ subfolder to keep the app dir tidy (just the
    // app jar, lib/, the .ini files and data/). The app jar's manifest Class-Path
    // (set on the jar task) points the launcher at these; jpackage puts only the
    // root --main-jar on the classpath, so the manifest is what pulls lib/ in.
    from(configurations.runtimeClasspath) {
        into 'lib'
    }
    from('src') {
        include 'towns.ini'
        include 'graphics.ini'
        include 'audio.ini'
    }
    // The launcher's in-window logo and pre-scaled window icons; in dev it
    // reads the same files straight from packaging/icons/ (the working
    // directory is src/).
    from('packaging/icons') {
        include 'OpenTowns.png'
    }
    from('packaging/icons/source') {
        include 'logo-16.png'
        include 'logo-32.png'
        include 'logo-48.png'
        into 'icons'
    }
    from('src/data') {
        into 'data'
        // Defensive: exclude the proprietary assets in case a developer's
        // working tree has them present (they are gitignored, not tracked).
        exclude 'graphics/**'
        exclude 'audio/**'
        exclude 'fonts/**'
    }
}

// Invoke the toolchain JDK's own jpackage so it matches the JDK 25 the game is
// built and run against (a full JDK ships the jmods jpackage needs to jlink a
// runtime).
tasks.register('jpackageImage') {
    dependsOn 'stageJpackageInput'
    def inputDir = layout.buildDirectory.dir('jpackage-input')
    def destDir = layout.buildDirectory.dir('jpackage')
    def jarTask = tasks.named('jar')
    inputs.dir inputDir
    outputs.dir destDir
    doLast {
        def launcher = javaToolchains.launcherFor(java.toolchain).get()
        def jpackageExe = launcher.metadata.installationPath
                .file('bin/jpackage' + (osName.contains('win') ? '.exe' : '')).asFile
        // jpackage refuses to write into an existing app image; clear it first.
        delete destDir
        destDir.get().asFile.mkdirs()

        // Each JVM flag the game needs at runtime, mirrored from the run task.
        // $APPDIR is substituted by the launcher to the app's content dir.
        def javaOptions = [
                '--enable-native-access=ALL-UNNAMED',
                '--sun-misc-unsafe-memory-access=allow',
                '-Dtowns.home=$APPDIR',
                // Lets a player drop steam_api into the app dir for Steam
                // features; harmless (and Steam stays optional) when absent.
                '-Djava.library.path=$APPDIR',
        ]
        if (isMac) {
            // GLFW must own the first thread on macOS (see the run task).
            javaOptions << '-XstartOnFirstThread'
        }

        // Platform app icon, baked into the launcher (.exe), the .app bundle or
        // the Linux app-image by jpackage. One file per OS, format fixed by the
        // platform; all three are generated from packaging/icons/source/ by
        // packaging/icons/generate.py and committed under packaging/icons/.
        def iconFile = osName.contains('win')
                ? file('packaging/icons/OpenTowns.ico')
                : (isMac ? file('packaging/icons/OpenTowns.icns')
                         : file('packaging/icons/OpenTowns.png'))

        def cmd = [
                jpackageExe.absolutePath,
                '--type', 'app-image',
                '--name', appName,
                '--app-version', appVersion,
                '--input', inputDir.get().asFile.absolutePath,
                '--main-jar', jarTask.get().archiveFileName.get(),
                '--main-class', 'xaos.Towns',
                '--dest', destDir.get().asFile.absolutePath,
        ]
        // Attach the icon when present so a partial checkout (icons not yet
        // generated) still packages, just with jpackage's default icon.
        if (iconFile.exists()) {
            cmd += ['--icon', iconFile.absolutePath]
        } else {
            logger.warn("jpackage: ${iconFile} missing; packaging without a custom icon")
        }
        javaOptions.each { cmd += ['--java-options', it] }

        exec { commandLine cmd }
    }
}

// Zip the app image for distribution. The classifier mirrors the LWJGL native
// bundle so the three OS artifacts never collide (e.g. -windows, -macos-arm64).
tasks.register('jpackageZip', Zip) {
    dependsOn 'jpackageImage'
    def classifier = lwjglNatives.replace('natives-', '')
    archiveFileName = "${appName}-${appVersion}-${classifier}.zip"
    destinationDirectory = layout.buildDirectory.dir('distributions')
    from layout.buildDirectory.dir('jpackage')
    from(rootDir) {
        include 'LICENSE', 'README.md', 'CHANGELOG.md'
    }
}
